# Haber turunu düzenli tetikler. Gerçek paylaşım sıklığını uygulama (admin ayarı)
# belirler; bu iş sadece "zamanı geldi mi" diye dürtükler.
name: news-cron

on:
  schedule:
    - cron: "*/5 * * * *" # her 5 dakikada bir (GitHub gecikmeli tetikleyebilir)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news endpoint
        run: |
          curl -sS -X POST "${{ secrets.APP_URL }}/api/cron/news" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60 || true
